<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SIMAE - Supervisão Escolar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0f3b5c">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div id="login" class="container">
    <div class="card">
      <h1>📋 SIMAE</h1>
      <p>Sistema de Monitoramento Escolar</p>
      <label>E-mail institucional (SEDU/SRE):</label>
      <input type="email" id="email" placeholder="supervisor@sedu.es.gov.br">
      <button id="btnLogin" class="primary">Entrar</button>
    </div>
  </div>

  <div id="dashboard" style="display:none">
    <header>
      <h2>SIMAE - <span id="nomeSupervisor"></span></h2>
      <button id="btnSair" class="secondary">Sair</button>
    </header>
    <div class="filtros">
      <select id="selectEscola">
        <option value="">Carregando escolas...</option>
      </select>
      <select id="selectTipoVisita">
        <option value="in_loco">Visita in loco</option>
        <option value="remoto">Monitoramento remoto</option>
        <option value="hibrido">Híbrido (remoto+presencial)</option>
      </select>
      <button id="btnNovaVisita" class="primary">➕ Nova visita</button>
      <button id="btnCarregarVisita" class="secondary">📂 Carregar pendente</button>
    </div>

    <div id="ice-area"></div>
    <div id="checklist-area"></div>

    <div id="botoes-finalizacao" style="display:none">
      <button id="btnSalvarLocal" class="secondary">💾 Salvar rascunho (offline)</button>
      <button id="btnSincronizar" class="primary">☁️ Finalizar e sincronizar</button>
    </div>

    <div id="relatorio-area"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
